<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>MetLife Smart Planner 360° — App Dashboard</title>
<style>
:root{
  --navy:#0F2A43; --navy2:#123354; --blue:#0090DA; --blue-d:#0072B8; --green:#5A9E1E; --green-l:#A4CE4E;
  --amber:#B26A00; --amber-bg:#FCF3E3; --red:#C0392B; --red-bg:#FDEEEA;
  --ink:#1A2B3C; --grey:#46586A; --grey-l:#7C8FA0;
  --bg:#F2F5F8; --card:#fff; --line:#E1E8EE; --tint:#EAF4FB; --tint-b:#BFDFF3;
  --r:10px; --sh:0 1px 3px rgba(15,42,67,.07),0 4px 14px rgba(15,42,67,.05);
  --sbw:236px;
}
*{box-sizing:border-box;margin:0;padding:0}
html,body{height:100%}
body{font-family:"Segoe UI",-apple-system,BlinkMacSystemFont,Roboto,Arial,sans-serif;background:var(--bg);color:var(--ink);line-height:1.45;font-size:14px}
button{font:inherit;cursor:pointer;border:none;background:none}
input,select{font:inherit;color:var(--ink)}
h1,h2,h3,h4{color:var(--navy)}

/* ================= SHELL ================= */
.sb{position:fixed;left:0;top:0;bottom:0;width:var(--sbw);background:linear-gradient(180deg,var(--navy),var(--navy2));display:flex;flex-direction:column;gap:2px;padding:16px 10px 12px;overflow-y:auto;z-index:90;transition:width .22s}
body.sbMin .sb{width:64px;padding:16px 7px 12px}
.sLogo{display:flex;align-items:center;gap:9px;color:#fff;font-weight:700;padding:2px 8px 16px;font-size:.9rem}
.sLogo small{color:#7E96A9;font-weight:400;font-size:.64rem;display:block;letter-spacing:.1em}
.sbi{display:flex;align-items:center;gap:10px;color:#B9C9D6;padding:9px 10px;border-radius:8px;font-size:.8rem;width:100%;text-align:left}
.sbi:hover{background:rgba(255,255,255,.07);color:#fff}
.sbi.on{background:var(--blue);color:#fff;font-weight:700}
.sbi .ic{width:18px;text-align:center;flex:none}
.sec{font-size:.62rem;letter-spacing:.14em;color:#6E87A0;font-weight:700;padding:14px 10px 5px;text-transform:uppercase}
.sub2{margin-left:19px;border-left:2px solid rgba(255,255,255,.12)}
.sub2 .sbi{padding:6px 10px;font-size:.77rem;border-radius:0 8px 8px 0}
.sub2 .sbi.on{background:rgba(0,144,218,.28);border-left:2px solid var(--blue);margin-left:-2px}
.cMini{background:rgba(255,255,255,.07);border-radius:10px;padding:10px;margin:6px 4px 2px;display:flex;gap:9px;align-items:center}
.cMini .n{color:#fff;font-weight:700;font-size:.76rem}
.cMini .s{font-size:.68rem;color:#8FB3C9}
.sbSpace{flex:1}
.sbFoot{border-top:1px solid rgba(255,255,255,.14);padding-top:11px;margin-top:8px;display:flex;gap:9px;align-items:center}
.sbFoot .n{color:#fff;font-size:.74rem;font-weight:600;line-height:1.2}
.sbFoot .s{font-size:.68rem;color:#8FB3C9}
.avatar{width:28px;height:28px;border-radius:50%;background:var(--blue);color:#fff;font-size:.66rem;font-weight:700;display:flex;align-items:center;justify-content:center;flex:none}
body.sbMin .lb,body.sbMin .sec,body.sbMin .cMini,body.sbMin .sub2,body.sbMin .sLogo .lt,body.sbMin .sbFoot div{display:none}

.main{margin-left:var(--sbw);transition:margin .22s;min-height:100vh;display:flex;flex-direction:column}
body.sbMin .main{margin-left:64px}
.top{position:sticky;top:0;z-index:80;background:rgba(242,245,248,.92);backdrop-filter:blur(6px);border-bottom:1px solid var(--line);padding:10px 22px;display:flex;align-items:center;gap:14px;flex-wrap:wrap}
.top .bc{font-size:.68rem;color:var(--grey)}
.top .bc b{color:var(--navy);font-size:.95rem;display:block}
.iconBtn{width:34px;height:34px;border:1px solid var(--line);border-radius:8px;background:#fff;color:var(--grey);font-size:.9rem}
.iconBtn:hover{border-color:var(--blue);color:var(--blue)}
.seg{display:flex;gap:4px;margin-left:auto;background:#fff;border:1px solid var(--line);border-radius:99px;padding:5px;overflow-x:auto}
.seg button{display:flex;align-items:center;gap:7px;font-size:.76rem;font-weight:700;color:var(--grey);padding:7px 14px;border-radius:99px;white-space:nowrap}
.seg button .d{width:19px;height:19px;border-radius:50%;border:2px solid var(--grey-l);font-size:.6rem;font-weight:700;display:flex;align-items:center;justify-content:center;flex:none;color:var(--grey)}
.seg button.done{color:var(--green)} .seg button.done .d{background:var(--green-l);border-color:var(--green-l);color:#fff}
.seg button.cur{background:var(--tint);color:var(--blue-d)} .seg button.cur .d{border-color:var(--blue);color:var(--blue)}
.content{padding:16px 22px 60px;flex:1}

/* ================= 12-COL GRID ================= */
.pgrid{display:grid;grid-template-columns:repeat(12,1fr);gap:14px;align-items:start}
.c3{grid-column:span 3}.c4{grid-column:span 4}.c5{grid-column:span 5}.c6{grid-column:span 6}
.c7{grid-column:span 7}.c8{grid-column:span 8}.c9{grid-column:span 9}.c12{grid-column:span 12}
.stack{display:grid;gap:14px}
@media(max-width:1250px){.c3,.c4{grid-column:span 6}.c5,.c7,.c8,.c9{grid-column:span 12}}
@media(max-width:820px){.pgrid>*{grid-column:span 12!important}}

/* ================= CARDS / FIELDS ================= */
.card{background:#fff;border:1px solid var(--line);border-radius:var(--r);box-shadow:var(--sh);padding:16px 18px}
.card h3{font-size:.95rem;margin-bottom:2px}
.card .cap{color:var(--grey);font-size:.85rem;margin-bottom:10px}
.ctaBox{background:var(--tint);border-left:3px solid var(--blue);border-radius:8px;padding:10px 14px;margin-bottom:14px;font-size:.82rem;color:var(--navy);line-height:1.5}
.ctaBox b{color:var(--navy)}
.secLbl{font-size:.69rem;font-weight:700;letter-spacing:.1em;text-transform:uppercase;color:var(--grey);margin:12px 0 7px}
.grid2{display:grid;grid-template-columns:1fr 1fr;gap:9px 14px}
.grid3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:9px 14px}
.f label{display:block;font-size:.76rem;color:var(--grey);margin-bottom:3px;font-weight:600}
.f input,.f select{width:100%;padding:7px 10px;border:1px solid var(--line);border-radius:7px;background:#fff}
.f input:focus,.f select:focus{outline:2px solid var(--tint-b);border-color:var(--blue)}
.f.calc input{background:var(--tint);border-color:var(--tint-b);font-weight:700;color:var(--blue-d);cursor:default}
.calcIc{font-size:.7rem;cursor:help}
.calcSrc{font-size:.68rem;color:var(--grey);margin-top:3px}
.src{display:inline-block;font-size:.63rem;font-weight:700;color:var(--blue-d);background:var(--tint);border-radius:4px;padding:1px 5px;margin-left:4px;vertical-align:1px}
.btnP{background:var(--blue);color:#fff;font-weight:700;border-radius:8px;padding:10px 20px;font-size:.84rem}
.btnP:hover{background:var(--blue-d)}
.btnS{background:#fff;border:1px solid var(--line);color:var(--grey);font-weight:600;border-radius:8px;padding:10px 16px;font-size:.84rem}
.navRow{display:flex;gap:10px;justify-content:flex-end;margin-top:14px}
.navRow .btnP{flex:1;max-width:460px}
.chip{display:inline-block;background:var(--tint);color:var(--blue-d);font-weight:700;border-radius:5px;padding:0 5px}
.disc{font-size:.66rem;color:var(--grey);background:var(--bg);border:1px solid var(--line);border-radius:8px;padding:8px 12px;margin-top:10px}

/* KPIs & dashboard */
.kpi{background:#fff;border:1px solid var(--line);border-top:3px solid var(--blue);border-radius:var(--r);box-shadow:var(--sh);padding:12px 16px}
.kpi .l{font-size:.68rem;font-weight:700;letter-spacing:.08em;color:var(--grey);text-transform:uppercase}
.kpi .v{font-size:1.45rem;font-weight:800;color:var(--navy);margin:1px 0}
.kpi .s{font-size:.68rem;color:var(--grey)}
table.leads{width:100%;border-collapse:collapse;font-size:.78rem}
table.leads th{font-size:.6rem;text-transform:uppercase;letter-spacing:.07em;color:var(--grey);text-align:left;padding:8px 10px;border-bottom:1px solid var(--line)}
table.leads td{padding:8px 10px;border-bottom:1px solid var(--line);vertical-align:middle}
tr.lost td{opacity:.5}
.lAv{width:26px;height:26px;border-radius:50%;color:#fff;font-size:.63rem;font-weight:700;display:inline-flex;align-items:center;justify-content:center;margin-right:8px;vertical-align:middle}
.sbdg{font-size:.7rem;font-weight:700;border-radius:99px;padding:2px 9px}
.sbdg.hot{background:#EFF7E6;color:var(--green);border:1px solid #CBE3A9}
.sbdg.warm{background:var(--amber-bg);color:var(--amber);border:1px solid #F0D9AC}
.sbdg.cold{background:var(--bg);color:var(--grey);border:1px solid var(--line)}
.dot{display:inline-block;width:7px;height:7px;border-radius:50%;margin-right:5px}
.filterRow{display:flex;gap:6px;margin-bottom:10px;align-items:center;flex-wrap:wrap}
.filterRow button{font-size:.7rem;font-weight:700;padding:4px 12px;border-radius:99px;background:var(--bg);color:var(--grey);border:1px solid var(--line)}
.filterRow button.on{background:var(--navy);color:#fff;border-color:var(--navy)}
.filterRow .cnt{margin-left:auto;font-size:.7rem;color:var(--grey)}
.nba{display:flex;gap:10px;border:1px solid var(--line);border-radius:8px;padding:10px 12px;margin-bottom:8px;align-items:flex-start}
.nba .ic{width:26px;height:26px;border-radius:8px;background:var(--tint);color:var(--blue-d);display:flex;align-items:center;justify-content:center;flex:none;font-size:.8rem}
.nba .t{font-size:.78rem;font-weight:700;color:var(--navy)}
.nba .d{font-size:.7rem;color:var(--grey)}
.skillRow{display:flex;gap:10px;align-items:center;border:1px solid var(--line);border-radius:8px;padding:10px 12px;margin-bottom:8px;width:100%;text-align:left;transition:.15s;background:#fff}
.skillRow:hover{border-color:var(--blue);transform:translateX(2px)}
.skillRow .no{font-size:.7rem;font-weight:800;color:var(--blue);width:20px}
.skillRow .t{font-weight:700;color:var(--navy);font-size:.8rem}
.skillRow .d{font-size:.68rem;color:var(--grey)}
.skillRow .go{margin-left:auto;color:var(--blue);font-weight:700}

/* score */
.ring{width:104px;height:104px;border-radius:50%;background:conic-gradient(var(--green) calc(var(--p)*1%), #E4EDF3 0);display:flex;align-items:center;justify-content:center;margin:6px auto 12px}
.ring .inn{width:80px;height:80px;border-radius:50%;background:#fff;display:flex;flex-direction:column;align-items:center;justify-content:center}
.ring .inn b{font-size:1.5rem;color:var(--navy)}
.ring .inn s{font-size:.62rem;color:var(--green);font-weight:700;text-decoration:none}
.factRow{border:1px solid var(--line);border-radius:8px;padding:8px 11px;margin-bottom:7px}
.factRow .t{display:flex;justify-content:space-between;font-size:.75rem;font-weight:700;color:var(--navy)}
.factRow .t b{color:var(--blue-d)}
.factRow .w{font-size:.7rem;color:var(--grey)}
.fbar{height:4px;border-radius:3px;background:#E4EDF3;margin-top:5px;overflow:hidden}
.fbar i{display:block;height:100%;background:var(--green-l)}

/* accordions / beats */
.acc{border:1px solid var(--line);border-radius:8px;margin-bottom:8px;overflow:hidden;background:#fff}
.acc>button{width:100%;display:flex;align-items:center;gap:9px;padding:10px 12px;text-align:left;font-size:.79rem;font-weight:700;color:var(--navy)}
.acc>button .ar{margin-left:auto;color:var(--grey-l);transition:.2s;flex:none}
.acc.open>button .ar{transform:rotate(180deg)}
.acc .bd{display:none;padding:0 12px 12px;font-size:.77rem;color:var(--grey)}
.acc.open .bd{display:block}
.acc .bd b{color:var(--navy)}
.acc .intent{font-size:.64rem;font-weight:700;letter-spacing:.08em;color:var(--blue-d);background:var(--tint);border-radius:4px;padding:2px 7px}
.beatChk{accent-color:var(--green);width:15px;height:15px;flex:none}
.acc.checked{background:#F7FBEF;border-color:#CBE3A9}
.q{border-left:3px solid var(--tint-b);background:var(--bg);border-radius:0 7px 7px 0;padding:8px 10px;margin-top:6px;font-style:italic;font-size:.76rem;color:var(--grey)}
.aiTxt .full{display:none}.aiTxt.open .full{display:inline}.aiTxt.open .short{display:none}
.rm{color:var(--blue);font-weight:700;font-size:.72rem}
.gc{border:1px solid var(--line);border-radius:8px;margin-bottom:7px;overflow:hidden}
.gc button.gh{width:100%;display:flex;align-items:center;gap:8px;padding:8px 10px;font-size:.74rem;font-weight:700;color:var(--navy);text-align:left}
.gc .gh .ar{margin-left:auto;color:var(--grey-l);transition:.2s}
.gc.open .gh .ar{transform:rotate(180deg)}
.gc .gb{display:none;padding:0 10px 9px;font-size:.71rem;color:var(--grey);font-style:italic}
.gc.open .gb{display:block}
.railHead{background:linear-gradient(120deg,var(--navy),#154066);color:#fff;border-radius:var(--r) var(--r) 0 0;padding:11px 14px;font-weight:700;font-size:.82rem}
.railHead small{display:block;font-weight:400;color:#9FB4C6;font-size:.69rem}
.railBody{background:#fff;border:1px solid var(--line);border-top:none;border-radius:0 0 var(--r) var(--r);padding:10px}
.railWrap{box-shadow:var(--sh);border-radius:var(--r)}

/* gaps / sliders */
.gapRow{display:grid;grid-template-columns:1fr 1fr 1fr;gap:10px;margin-top:10px}
.gap{background:var(--bg);border:1px solid var(--line);border-radius:8px;padding:10px 12px;text-align:center}
.gap .l{font-size:.65rem;color:var(--grey);font-weight:600}
.gap .v{font-size:1.2rem;font-weight:800;color:var(--navy)}
.gap .how{font-size:.68rem;color:var(--blue);font-weight:700;margin-top:2px;display:inline-block}
.howBox{display:none;font-size:.68rem;color:var(--grey);background:var(--tint);border-radius:6px;padding:7px 9px;margin-top:6px;text-align:left}
.gap.open .howBox{display:block}
.alloc{border:1px solid var(--line);border-radius:8px;padding:11px 13px;margin-bottom:9px;background:#fff}
.alloc .topr{display:flex;align-items:baseline;gap:10px}
.alloc .nm{font-weight:700;font-size:.82rem;color:var(--navy)}
.alloc .gp{font-size:.68rem;color:var(--grey)}
.alloc .pc{margin-left:auto;font-weight:800;font-size:.95rem;color:var(--navy)}
.alloc .amt{font-size:.68rem;color:var(--grey);text-align:right}
input[type=range]{width:100%;accent-color:var(--blue);margin-top:5px}
.allocBar{display:flex;justify-content:space-between;align-items:center;gap:10px;background:var(--navy);color:#fff;border-radius:8px;padding:10px 14px;font-size:.78rem;margin-top:6px}
.allocBar b{font-size:.92rem}
.verd{border-radius:99px;padding:3px 11px;font-weight:700;font-size:.7rem}
.verd.ok{background:#EFF7E6;color:var(--green)}.verd.tight{background:var(--amber-bg);color:var(--amber)}.verd.rev{background:var(--red-bg);color:var(--red)}
.warn{display:flex;gap:8px;font-size:.75rem;border-radius:8px;padding:9px 12px;margin-top:8px}
.warn.g{background:#EFF7E6;color:var(--green)}.warn.a{background:var(--amber-bg);color:var(--amber)}.warn.r{background:var(--red-bg);color:var(--red)}
.rank{display:flex;align-items:center;gap:10px;border:1px solid var(--line);border-radius:8px;padding:8px 12px;margin-bottom:6px;background:#fff}
.rank .no{width:21px;height:21px;border-radius:50%;background:var(--blue);color:#fff;font-size:.66rem;font-weight:700;display:flex;align-items:center;justify-content:center;flex:none}
.rank .nm{font-weight:600;font-size:.8rem}
.rank .lock{font-size:.6rem;color:var(--grey-l);background:var(--bg);border-radius:99px;padding:2px 8px}
.rank .mv{margin-left:auto;display:flex;gap:4px}
.rank .mv button{width:23px;height:23px;border:1px solid var(--line);border-radius:6px;color:var(--grey);font-size:.68rem}
.rank .mv button:hover{border-color:var(--blue);color:var(--blue)}

/* products / p4 */
.prod{border:1px solid var(--line);border-radius:8px;padding:11px 13px;margin-bottom:8px;display:flex;gap:12px;align-items:flex-start}
.prod .i{flex:1}
.prod .nm{font-weight:700;font-size:.82rem;color:var(--navy)}
.prod .tag{display:inline-block;font-size:.64rem;font-weight:700;border-radius:4px;padding:2px 6px;margin-left:6px;background:var(--tint);color:var(--blue-d)}
.prod .d{font-size:.72rem;color:var(--grey);margin-top:2px}
.prod .pr{text-align:right}
.prod .pr .m{font-weight:800;color:var(--navy)}
.prod .pr .s{font-size:.7rem;color:var(--grey)}
.unfundedHead{width:100%;text-align:left;font-size:.74rem;font-weight:700;color:var(--grey);padding:7px 2px}
.unfunded{display:none}.unfunded.open{display:block}
.pCard{border:1px solid var(--line);border-radius:var(--r);padding:13px;flex:1;min-width:250px}
.pCard .rec{font-size:.62rem;font-weight:700;letter-spacing:.06em;background:var(--tint);color:var(--blue-d);border-radius:4px;padding:2px 7px}
.pCard h4{font-size:.9rem;margin:5px 0 8px;color:var(--blue-d)}
.pStats{display:grid;grid-template-columns:1fr 1fr;gap:7px}
.pStats .st{background:var(--bg);border-radius:7px;padding:7px 9px}
.pStats .st .l{font-size:.62rem;font-weight:700;letter-spacing:.06em;color:var(--grey);text-transform:uppercase}
.pStats .st .v{font-weight:800;color:var(--navy)}
.feat{font-size:.7rem;color:var(--grey);margin-top:8px}
.feat li{margin-left:16px;margin-top:2px}
.riskPills{display:flex;gap:8px;margin:8px 0}
.riskPills button{flex:1;border:2px solid var(--line);border-radius:8px;padding:8px;text-align:center}
.riskPills button.on{border-color:var(--blue);background:var(--tint)}
.riskPills .rn{font-weight:700;font-size:.76rem;color:var(--navy)}
.riskPills .rr{font-size:.68rem;color:var(--grey)}
.simRow{display:flex;align-items:center;gap:12px;font-size:.74rem;color:var(--grey);margin-top:6px;flex-wrap:wrap}
.simRow b{color:var(--navy);font-size:.9rem}
.tblY{width:100%;border-collapse:collapse;font-size:.74rem;margin-top:8px}
.tblY th,.tblY td{padding:6px 10px;border-bottom:1px solid var(--line);text-align:right}
.tblY th:first-child,.tblY td:first-child{text-align:left}
.tblY th{color:var(--grey);font-size:.6rem;text-transform:uppercase;letter-spacing:.06em}
.tblY tr.hl td{background:var(--tint);font-weight:700}
.closeSeq{counter-reset:cs;font-size:.76rem;color:var(--grey)}
.closeSeq li{list-style:none;counter-increment:cs;display:flex;gap:9px;padding:4px 0}
.closeSeq li::before{content:counter(cs);width:19px;height:19px;border-radius:50%;background:var(--blue);color:#fff;font-size:.6rem;font-weight:700;display:flex;align-items:center;justify-content:center;flex:none}
.trig{display:flex;gap:6px;flex-wrap:wrap;margin-top:6px}
.trig span{font-size:.7rem;font-weight:600;background:var(--bg);border:1px solid var(--line);border-radius:99px;padding:3px 10px;color:var(--grey)}
.outRow{display:flex;gap:10px;flex-wrap:wrap;margin-top:10px}
.outRow button{flex:1;min-width:130px;border-radius:8px;padding:11px;font-weight:700;font-size:.8rem;border:2px solid transparent}
.oWon{background:#EFF7E6;color:var(--green)}.oPend{background:var(--amber-bg);color:var(--amber)}.oLost{background:var(--red-bg);color:var(--red)}
.outRow button.picked{border-color:currentColor}
.outMsg{margin-top:10px;font-size:.78rem;font-weight:700;color:var(--green)}
.toast{position:fixed;bottom:24px;left:50%;transform:translateX(-50%);background:var(--navy);color:#fff;border-radius:99px;padding:10px 22px;font-size:.8rem;font-weight:600;box-shadow:0 8px 30px rgba(15,42,67,.35);opacity:0;pointer-events:none;transition:.3s;z-index:200}
.toast.show{opacity:1}
.btnP:disabled{opacity:.45;cursor:not-allowed}

/* goal planner / choose your plan */
.stepIc{width:22px;height:22px;border-radius:50%;background:var(--tint);color:var(--blue-d);font-size:.7rem;font-weight:800;display:inline-flex;align-items:center;justify-content:center;flex:none}
.snapGrid{display:grid;grid-template-columns:repeat(4,1fr);gap:10px;margin-top:10px}
.snapBox{background:var(--tint);border-radius:8px;padding:11px 13px}
.snapBox.wide{grid-column:span 2}
.snapBox .l{font-size:.66rem;color:var(--grey)}
.snapBox .v{font-size:1.05rem;font-weight:800;color:var(--navy);margin-top:2px}
.snapBox input{background:#fff;border:1px solid var(--tint-b);border-radius:7px;padding:7px 10px;width:100%}
.needGrid{display:grid;grid-template-columns:repeat(3,1fr);gap:10px;margin-top:10px}
.needCard{position:relative;text-align:left;border:1px solid var(--line);border-radius:8px;padding:12px 14px;background:#fff}
.needCard.on{background:var(--tint);border-color:var(--tint-b)}

function getSimulationData() {
  const setup = LEAD.planSetup;
  const term = setup.term;
  const growth = LEAD.growth;
  const dumpIn = setup.dumpIn;
  
  // Calculate annual contribution
  let A = setup.contribution;
  if (setup.frequency === "Monthly") A = setup.contribution * 12;
  else if (setup.frequency === "Quarterly") A = setup.contribution * 4;
  else if (setup.frequency === "Semi-annually") A = setup.contribution * 2;
  
  const Mc = A / 12;
  
  // Rider fee calculations
  const accidental = setup.riders["Accidental Death & Dismemberment"];
  const critical = setup.riders["Critical Illness Cover"];
  const waiver = setup.riders["Waiver of Premium"];
  const R = (accidental ? 15 : 0) + (critical ? 45 : 0) + (waiver ? A * 0.02 / 12 : 0);
  
  let data = [];
  let val = dumpIn;
  let paid = dumpIn;
  
  // Initial point
  data.push({ year: 0, paid: paid, val: val, db: Math.max(60000, val) });
  
  for (let y = 1; y <= term; y++) {
    for (let m = 1; m <= 12; m++) {
      setup.events.forEach(ev => {
        if (ev.year === y && m === 1 && ev.type === "Top-up") {
          val += ev.amount;
          paid += ev.amount;
        }
      });
      
      paid += Mc;
      val = (val + Mc - R) * (1 + (growth / 1200) - 0.00083);
      if (val < 0) val = 0;
    }
    
    const db = Math.max(60000, val);
    data.push({ year: y, paid: Math.round(paid), val: Math.round(val), db: Math.round(db) });
  }
  return data;
}

function generateSimulationSVG(data) {
  const maxVal = Math.max(...data.map(d => Math.max(d.paid, d.val, d.db, 50000)));
  const width = 500;
  const height = 220;
  const paddingLeft = 60;
  const paddingRight = 20;
  const paddingTop = 20;
  const paddingBottom = 30;
  
  const mapX = (year) => paddingLeft + (year / data[data.length - 1].year) * (width - paddingLeft - paddingRight);
  const mapY = (val) => height - paddingBottom - (val / maxVal) * (height - paddingTop - paddingBottom);
  
  let grid = "";
  const steps = 5;
  for (let i = 0; i <= steps; i++) {
    const v = (maxVal / steps) * i;
    const y = mapY(v);
    grid += `<line x1="${paddingLeft}" y1="${y}" x2="${width - paddingRight}" y2="${y}" stroke="#E1E8EE" stroke-width="1" />`;
    grid += `<text x="${paddingLeft - 10}" y="${y + 4}" fill="#7C8FA0" font-size="9" text-anchor="end">${fmtM(v)}</text>`;
  }
  
  let xLabels = "";
  const yearStep = Math.max(1, Math.round(data.length / 10));
  data.forEach((d, idx) => {
    if (idx === 0 || d.year % yearStep === 0 || idx === data.length - 1) {
      const x = mapX(d.year);
      xLabels += `<text x="${x}" y="${height - 5}" fill="#7C8FA0" font-size="9" text-anchor="middle">Yr ${d.year}</text>`;
    }
  });
  
  const pointsPaid = data.map(d => `${mapX(d.year)},${mapY(d.paid)}`).join(" ");
  const pointsVal = data.map(d => `${mapX(d.year)},${mapY(d.val)}`).join(" ");
  const pointsDb = data.map(d => `${mapX(d.year)},${mapY(d.db)}`).join(" ");
  
  const areaPath = `M ${mapX(0)} ${height - paddingBottom} ` + data.map(d => `L ${mapX(d.year)} ${mapY(d.val)}`).join(" ") + ` L ${mapX(data[data.length-1].year)} ${height - paddingBottom} Z`;
  
  return `
    <svg viewBox="0 0 ${width} ${height}" style="width:100%; height:auto;">
      ${grid}
      ${xLabels}
      <path d="${areaPath}" fill="rgba(0,144,218,0.1)" />

      <polyline points="${pointsVal}" fill="none" stroke="#0090DA" stroke-width="3" />
      <circle cx="${mapX(data[data.length-1].year)}" cy="${mapY(data[data.length-1].val)}" r="5" fill="#0090DA" />
      <circle cx="${mapX(data[data.length-1].year)}" cy="${mapY(data[data.length-1].paid)}" r="4" fill="#46586A" />
    </svg>
  `;
}

function generateScenarioSVG(data) {
  const setup = LEAD.planSetup;
  const term = setup.term;
  const growth = LEAD.growth;
  const dumpIn = setup.dumpIn;
  let A = setup.contribution;
  if (setup.frequency === "Monthly") A = setup.contribution * 12;
  else if (setup.frequency === "Quarterly") A = setup.contribution * 4;
  else if (setup.frequency === "Semi-annually") A = setup.contribution * 2;
  const Mc = A / 12;
  const accidental = setup.riders["Accidental Death & Dismemberment"];
  const critical = setup.riders["Critical Illness Cover"];
  const waiver = setup.riders["Waiver of Premium"];
  const R = (accidental ? 15 : 0) + (critical ? 45 : 0) + (waiver ? A * 0.02 / 12 : 0);
  
  const simWithGrowth = (gPct) => {
    let pts = [];
    let val = dumpIn;
    pts.push({ year: 0, val: val });
    for (let y = 1; y <= term; y++) {
      for (let m = 1; m <= 12; m++) {
        setup.events.forEach(ev => {
          if (ev.year === y && m === 1 && ev.type === "Top-up") val += ev.amount;
        });
        val = (val + Mc - R) * (1 + (gPct / 1200) - 0.00083);
        if (val < 0) val = 0;
      }
      pts.push({ year: y, val: Math.round(val) });
    }
    return pts;
  };
  
  const midData = data;
  const bestData = simWithGrowth(growth + 2);
  const worstData = simWithGrowth(Math.max(0, growth - 3));
  
  const maxVal = Math.max(...bestData.map(d => d.val), 50000);
  
  const width = 500;
  const height = 220;
  const paddingLeft = 60;
  const paddingRight = 20;
  const paddingTop = 20;
  const paddingBottom = 30;
  
  const mapX = (year) => paddingLeft + (year / term) * (width - paddingLeft - paddingRight);
  const mapY = (val) => height - paddingBottom - (val / maxVal) * (height - paddingTop - paddingBottom);
  
  let grid = "";
  const steps = 5;
  for (let i = 0; i <= steps; i++) {
    const v = (maxVal / steps) * i;
    const y = mapY(v);
    grid += `<line x1="${paddingLeft}" y1="${y}" x2="${width - paddingRight}" y2="${y}" stroke="#E1E8EE" stroke-width="1" />`;
    grid += `<text x="${paddingLeft - 10}" y="${y + 4}" fill="#7C8FA0" font-size="9" text-anchor="end">${fmtM(v)}</text>`;
  }
  
  let xLabels = "";
  const yearStep = Math.max(1, Math.round(term / 10));
  for (let y = 0; y <= term; y += yearStep) {
    const x = mapX(y);
    xLabels += `<text x="${x}" y="${height - 5}" fill="#7C8FA0" font-size="9" text-anchor="middle">Yr ${y}</text>`;
  }
  
  const pointsMid = midData.map(d => `${mapX(d.year)},${mapY(d.val)}`).join(" ");
  const pointsBest = bestData.map(d => `${mapX(d.year)},${mapY(d.val)}`).join(" ");
  const pointsWorst = worstData.map(d => `${mapX(d.year)},${mapY(d.val)}`).join(" ");
  
  return `
    <svg viewBox="0 0 ${width} ${height}" style="width:100%; height:auto;">
      ${grid}
      ${xLabels}
      <polyline points="${pointsWorst}" fill="none" stroke="#C0392B" stroke-width="2" stroke-dasharray="3,3" />
      <polyline points="${pointsBest}" fill="none" stroke="#5A9E1E" stroke-width="2" stroke-dasharray="3,3" />
      <polyline points="${pointsMid}" fill="none" stroke="#0090DA" stroke-width="3" />
      <circle cx="${mapX(term)}" cy="${mapY(midData[midData.length-1].val)}" r="4" fill="#0090DA" />
      <circle cx="${mapX(term)}" cy="${mapY(bestData[bestData.length-1].val)}" r="4" fill="#5A9E1E" />
      <circle cx="${mapX(term)}" cy="${mapY(worstData[worstData.length-1].val)}" r="4" fill="#C0392B" />
    </svg>
  `;
}

function getGoalMonthlyPremium(g) {
  if (!goalConfigured(g)) return 0;
  const key = LEAD.chosenProduct[g] || GOAL_DEFS[g].products[0].key;
  if (isInvestmentLinked(g)) {
    const setup = LEAD.planSetup;
    let monthly = setup.contribution;
    if (setup.frequency === "Yearly") monthly = setup.contribution / 12;
    else if (setup.frequency === "Quarterly") monthly = setup.contribution / 3;
    else if (setup.frequency === "Semi-annually") monthly = setup.contribution / 6;
    return Math.round(monthly);
  } else {
    const ann = LEAD.premium[g + "|" + key] || 0;
    return Math.round(ann / 12);
  }
}

/* ---- nav row ---- */
function navRow(phase){
  if(phase===3){
    if(step3===4)return "";
    let nb;
    if(step3===3){
      const act=activeGoals(), total=act.reduce((a,g)=>a+(+LEAD.alloc[g]||0),0);
      nb=`<button class="btnP" id="next3" ${total!==100?"disabled":""}>Continue to recommendations →</button>`;
    } else {
      nb=`<button class="btnP" id="next3">Continue: ${steps3[step3]} →</button>`;
    }
    const bb=step3>1?'<button class="btnS" id="back3">← Back</button>':'<button class="btnS" data-nav="p2">← Pre-Meeting</button>';
    return `<div class="navRow">${bb}${nb}</div>`;
  }
  const nxt={1:["p2","Next phase: Pre-Meeting Practice →"],2:["p3","Next phase: Needs Analysis →"]}[phase];
  const bck={1:["dash","← Dashboard"],2:["p1","← Lead Management"],4:["p3","← Needs Analysis"]}[phase];
  return `<div class="navRow">
    ${bck?`<button class="btnS" data-nav="${bck[0]}">${bck[1]}</button>`:""}
    ${nxt?`<button class="btnP" data-nav="${nxt[0]}">${nxt[1]}</button>`:'<button class="btnP" data-nav="dash">Finish → back to Dashboard</button>'}
  </div>`;}

/* ================= render + wiring ================= */
function render(){
  renderSidebar(); renderTop();
  app.innerHTML={dash:dashView,p1:p1View,p2:p2View,p3:p3View,p4:p4View}[view]();
  wire(); window.scrollTo({top:0});
}
function toast(m){const t=document.getElementById("toast");t.textContent=m;t.classList.add("show");setTimeout(()=>t.classList.remove("show"),2400);}
function wire(){
  document.querySelectorAll("[data-nav]").forEach(b=>b.onclick=()=>{view=b.dataset.nav;render();});
  document.querySelectorAll("[data-go3]").forEach(b=>b.onclick=()=>{step3=+b.dataset.go3;render();});
  const st=document.getElementById("sbTgl");if(st)st.onclick=()=>document.body.classList.toggle("sbMin");
  app.querySelectorAll("[data-filter]").forEach(b=>b.onclick=()=>{filter=b.dataset.filter;render();});
  app.querySelectorAll("[data-acc]").forEach(b=>b.onclick=()=>document.getElementById(b.dataset.acc).classList.toggle("open"));
  app.querySelectorAll("[data-gc]").forEach(b=>b.onclick=()=>b.closest(".gc").classList.toggle("open"));
  app.querySelectorAll("[data-rm]").forEach(b=>b.onclick=()=>document.getElementById(b.dataset.rm).classList.toggle("open"));
  app.querySelectorAll("[data-how]").forEach(b=>b.onclick=()=>document.getElementById(b.dataset.how).classList.toggle("open"));
  app.querySelectorAll(".beatChk").forEach(c=>c.addEventListener("change",()=>{
    c.closest(".acc").classList.toggle("checked",c.checked);
    const id=c.dataset.cnt, all=app.querySelectorAll(`.beatChk[data-cnt="${id}"]`);
    const n=[...all].filter(x=>x.checked).length;
    const el=document.getElementById(id);if(el)el.textContent=`${n} of ${all.length} ${el.dataset.label}`;
  }));
  const n3=app.querySelector("#next3");if(n3)n3.onclick=()=>{if(step3===3)planTab=0;step3++;render();};
  const b3=app.querySelector("#back3");if(b3)b3.onclick=()=>{step3--;render();};
  [["#inIncome","incomeMo"],["#inExp","expMo"],["#inCover","cover"]].forEach(([sel,k])=>{
    const el=app.querySelector(sel);if(el)el.oninput=()=>{LEAD.fin[k]=+el.value||0;refreshCalc();};});
  const u=app.querySelector("[data-unf]");if(u)u.onclick=()=>app.querySelector("#unfBox").classList.toggle("open");

  /* Goal Planner (step 3) */
  const ct=app.querySelector("#currTgl");if(ct)ct.onclick=()=>{LEAD.currency.global=LEAD.currency.global==="KWD"?"USD":"KWD";render();};
  const sc=app.querySelector("#inSavCap");if(sc)sc.oninput=()=>{LEAD.fin.savingsCapMo=+sc.value||0;const y=app.querySelector("#savCapYr");if(y)y.textContent=fmt(LEAD.fin.savingsCapMo*12);};
  app.querySelectorAll("[data-need]").forEach(b=>b.onclick=()=>{const g=b.dataset.need;LEAD.selected[g]=!LEAD.selected[g];if(!LEAD.selected[g])LEAD.alloc[g]=0;render();});
  app.querySelectorAll("[data-allocpct]").forEach(inp=>inp.oninput=()=>{LEAD.alloc[inp.dataset.allocpct]=+inp.value||0;refreshAllocPlanner();});
  app.querySelectorAll("[data-goalamt]").forEach(inp=>{
    inp.oninput=()=>{const raw=inp.value.replace(/[^0-9.]/g,"");LEAD.goalAmt[inp.dataset.goalamt]=raw?+raw:"";};
    inp.onblur=()=>{const v=LEAD.goalAmt[inp.dataset.goalamt];if(v!=="")inp.value=fmt(v);};
  });
  app.querySelectorAll("[data-au]").forEach(b=>b.onclick=()=>{moveActive(b.dataset.au,-1);render();});
  app.querySelectorAll("[data-ad]").forEach(b=>b.onclick=()=>{moveActive(b.dataset.ad,1);render();});
  app.querySelectorAll("[data-remove]").forEach(b=>b.onclick=()=>{LEAD.selected[b.dataset.remove]=false;render();});
  refreshAllocPlanner();

  /* Choose your Plan (step 4) */
  app.querySelectorAll("[data-plangoal]").forEach(b=>b.onclick=()=>{
    if(b.dataset.plangoal==="__back"){step3=3;}else{planTab=+b.dataset.plangoal; planSubStep = 0;}render();});
  app.querySelectorAll("[data-chooseprod]").forEach(b=>b.onclick=()=>{
    const g=b.closest("[data-goalctx]")?.dataset.goalctx||activeGoals()[planTab];LEAD.chosenProduct[g]=b.dataset.chooseprod; planSubStep = 0; render();});
  
  // Sub-step setup handlers
  const sc_contrib = app.querySelector("[data-setup-contribution]");
  if(sc_contrib) sc_contrib.oninput = () => { LEAD.planSetup.contribution = +sc_contrib.value || 0; };
  
  const sc_freq = app.querySelector("[data-setup-frequency]");
  if(sc_freq) sc_freq.onchange = () => { LEAD.planSetup.frequency = sc_freq.value; };

  // Riders Toggles
  app.querySelectorAll("[data-setup-rider]").forEach(cb => {
    cb.onchange = () => {

      LEAD.planSetup.riders[rider] = cb.checked;

  // Projection Sliders

  const sgs = app.querySelector("#scenarioGrowthSlider");

  const addEv = app.querySelector("#addEventBtn");

    b.onclick = () => {
      const idx = +b.dataset.removeEvent;
      LEAD.planSetup.events.splice(idx, 1);
      render();
    };
  });
  
  // Disclosure checkbox to toggle save button state
  const discCheck = app.querySelector("#disclosureCheckbox");
  const saveBtn = app.querySelector("#wizardSaveBtn");
  if (discCheck && saveBtn) {
    discCheck.onchange = () => {
      saveBtn.disabled = !discCheck.checked;
    };
  }
  
  // Wizard Navigation
  app.querySelectorAll("[data-substep-next]").forEach(b => {
    b.onclick = () => {
      const g = activeGoals()[planTab];
      const steps = getValidSubSteps(g);
      const currentIdx = steps.indexOf(planSubStep);
      if (currentIdx < steps.length - 1) {
        planSubStep = steps[currentIdx + 1];
        render();
      }
    };
  });
  
  app.querySelectorAll("[data-substep-prev]").forEach(b => {
    b.onclick = () => {
      const g = activeGoals()[planTab];
      const steps = getValidSubSteps(g);
      const currentIdx = steps.indexOf(planSubStep);
      if (currentIdx > 0) {
        planSubStep = steps[currentIdx - 1];
        render();
      } else {
        // Go back to goals list
        if (planTab > 0) {
          planTab--;
          planSubStep = 0;
        } else {
          step3 = 3;
        }
        render();
      }
    };
  });
  
  // Save Plan finalization
  const sp = app.querySelector("#wizardSaveBtn");
  if(sp) {
    sp.onclick = () => {
      const g = app.querySelector("[data-goalctx]").dataset.goalctx;
      const prodKey = LEAD.chosenProduct[g] || GOAL_DEFS[g].products[0].key;
      const key = g + "|" + prodKey;
      
      const simData = getSimulationData();
      LEAD.premium[key] = simData[simData.length - 1].paid; // Store paid premium
      LEAD.premiumTouched[key] = true;
      
      const act = activeGoals();
      if (planTab < act.length - 1) {
        planTab++;
        planSubStep = 0;
        render();
      } else {
        // Go to Solution summary tab instead of immediately switching to view="p4"
        planTab = act.length;
        render();
      }
    };
  }

  // Solution Summary listeners
  app.querySelectorAll("[data-edit-plan-goal]").forEach(b => {
    b.onclick = () => {
      planTab = +b.dataset.editPlanGoal;
      planSubStep = 0;
      render();
    };
  });
  
  app.querySelectorAll("[data-delete-plan-goal]").forEach(b => {
    b.onclick = () => {
      const g = b.dataset.deletePlanGoal;
      const key = g + "|" + (LEAD.chosenProduct[g] || GOAL_DEFS[g].products[0].key);
      delete LEAD.premium[key];
      render();
    };
  });
  
  const goToP4 = app.querySelector("#goToP4Btn");
  if (goToP4) {
    goToP4.onclick = () => {
      view = "p4";
      render();
    };
  }

  // Solution & AI Insights page back button & download
  const p4Back = app.querySelector("#reviewBackBtn");
  if (p4Back) {
    p4Back.onclick = () => {
      view = "p3";
      planTab = activeGoals().length; // Solution summary tab
      render();
    };
  }

  const dlPdf = app.querySelector("#downloadPDFBtn");
  if (dlPdf) {
    dlPdf.onclick = () => {
      toast("Downloading Solution Summary PDF...");
    };
  }
  const rp=app.querySelector("#launchRP");if(rp)rp.onclick=()=>{
    const mood=app.querySelector("#rpMood").value;
    app.querySelector("#rpMsg").innerHTML=`<div class="warn g" style="margin-top:10px"><span>▶</span><span><b>Roleplay started</b> — AI avatar of ${LEAD.title} ${LEAD.first} in “${mood}” mood. First line: <i>“I only have a few minutes — what's this about?”</i></span></div>`;
    toast("Roleplay session launched");};
  const gs=app.querySelector("#growthSlider");if(gs)gs.oninput=()=>{LEAD.growth=+gs.value;refreshProj();};
  app.querySelectorAll("[data-risk]").forEach(b=>b.onclick=()=>{LEAD.growth=+b.dataset.risk;render();});
  app.querySelectorAll("[data-out]").forEach(b=>b.onclick=()=>{
    outcome=b.dataset.out;render();
    if(outcome==="won")toast("Pipeline updated — Dr James H marked as Won");
    if(outcome==="pend")toast("Follow-up reminder scheduled (+3 days)");});
  const lw=app.querySelector("#lostWhy");if(lw)lw.onchange=()=>{
    if(lw.value){app.querySelector("#outMsg").textContent=`✕ Marked Lost — reason “${lw.value}” recorded to Reports.`;toast("Loss reason recorded");}};
}
function refreshCalc(){
  const C=calc();
  const s=app.querySelector("#outSurplus"),b=app.querySelector("#outBudget");
  if(s)s.value=fmt(C.surplus);if(b)b.value=fmt(C.surplus*12);
  Object.entries({gLP:C.lp,gCI:C.ci,gAD:C.ad}).forEach(([id,v])=>{
    const el=app.querySelector("#"+id+" .v");if(el)el.textContent=fmtM(v);});
}
function refreshAllocPlanner(){
  const inputs=app.querySelectorAll("[data-allocpct]");
  if(!inputs.length)return;
  let total=0;
  inputs.forEach(inp=>total+=+inp.value||0);
  const t=app.querySelector("#allocTotal2"),m=app.querySelector("#allocMsg");
  if(t)t.innerHTML=`<b>${total}%</b>`;
  if(m)m.textContent=total===100?"":"Please ensure the total priority weight across selected needs equals 100%.";
  const n3=app.querySelector("#next3");if(n3&&step3===3)n3.disabled=total!==100;
}
function refreshProj(){
  const eduMo=Math.round(LEAD.commitMo*LEAD.alloc["Savings/Future Aspirations"]/100);
  const retMo=Math.round(LEAD.commitMo*LEAD.alloc["Retirement"]/100);
  const gv=app.querySelector("#growthVal"),pv=app.querySelector("#projVal"),tb=app.querySelector("#projRows");
  if(gv)gv.textContent=LEAD.growth.toFixed(1)+"%";
  if(pv)pv.textContent=fmt(fv(eduMo+retMo,LEAD.growth,20));
  if(tb)tb.innerHTML=[5,10,15,20].map(y=>{const paid=(eduMo+retMo)*12*y,val=fv(eduMo+retMo,LEAD.growth,y);
    return `<tr class="${y===20?"hl":""}"><td>Year ${y}${y===20?" (maturity)":""}</td><td>${fmt(paid)}</td><td>${fmt(val)}</td><td>${fmt(Math.max(val,paid))}</td></tr>`;}).join("");
}
render();
</script>
</body>
</html>
